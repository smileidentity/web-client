name: Security Audit

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/*/package.json'
      - 'packages/*/package-lock.json'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --omit=dev
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: Verify registry signatures
        run: npm audit signatures
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - name: Create issue on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "security-audit" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open security audit issue already exists, skipping creation."
            exit 0
          fi
          TITLE_DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "Security: npm audit vulnerabilities detected (${TITLE_DATE})" \
            --label "security-audit" \
            --label "priority:high" \
            --body "The daily security audit has detected vulnerabilities. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
