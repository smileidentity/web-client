name: deploy-preview
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests before deploying'
        type: boolean
        default: false
  pull_request:
    types:
      - opened
      - synchronize
permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write
jobs:
  test:
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/test.yml
  smart-camera-web:
    needs: [test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    defaults:
      run:
        working-directory: ./packages/web-components
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set node version
        uses: actions/setup-node@v4
      - name: install dependencies
        run: npm ci
      - name: build application
        run: npm run build
      - name: set destination directory
        id: set_dest_dir_smart_camera_web
        run: >-
          echo "DEST_DIR_SMART_CAMERA_WEB=js/preview-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" >>
          "$GITHUB_ENV"
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: deploy preview to s3
        run: |
          aws s3 sync --follow-symlinks --delete \
            ./dist s3://${{ secrets.AWS_S3_BUCKET }}/${{ env.DEST_DIR_SMART_CAMERA_WEB }}
  embed:
    needs: [smart-camera-web]
    defaults:
      run:
        working-directory: ./packages/embed
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set node version
        uses: actions/setup-node@v4
      - name: build web-components dependency
        run: |
          cd ../web-components
          npm ci
          npm run build
      - name: install dependencies
        run: npm ci
      - name: build application
        env:
          SENTRY_AUTH_TOKEN: '${{ secrets.SENTRY_AUTH_TOKEN }}'
        run: npm run build && npm run build:dist
      - name: set destination directory
        id: set_dest_dir_embed
        run: echo "DEST_DIR_EMBED=inline/preview-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: deploy preview to s3
        run: |
          aws s3 sync --follow-symlinks --delete dist s3://${{ secrets.AWS_S3_BUCKET }}/${{ env.DEST_DIR_EMBED }}
      - name: invalidate cloudfront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.DEST_DIR_EMBED }}/*"
  full-stack:
    needs: [embed]
    if: always()
    defaults:
      run:
        working-directory: ./previews
    runs-on: ubuntu-latest
    outputs:
      SST_URL: ${{ steps.deploy_sst_app.outputs.SST_URL }}
      SST_PROD_URL: ${{ steps.deploy_sst_app_prod.outputs.SST_PROD_URL }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: set sst stage
        id: get_branch_name
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          echo "DEST_DIR_EMBED=inline/preview-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          BRANCH_NAME="$BRANCH_REF"
          SANITIZED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "SST_STAGE=$SANITIZED_BRANCH_NAME" >> "$GITHUB_OUTPUT"
      - name: install dependencies
        run: npm install
      - name: build application
        run: npm run build
      - name: configure sst secrets
        run: |
          # Sandbox stage
          npm run sst secret set PartnerId ${{ secrets.PREVIEW_PARTNER_ID }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} &&
          npm run sst secret set CallbackUrl ${{ secrets.PREVIEW_CALLBACK_URL }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} &&
          npm run sst secret set SmileIdApiKey ${{ secrets.PREVIEW_SMILEID_API_KEY }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} &&
          npm run sst secret set SmileIdEnvironment ${{ secrets.PREVIEW_SMILEID_ENVIRONMENT }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} &&
          npm run sst secret set EmbedUrl ${{ env.DEST_DIR_EMBED }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} &&
          npm run sst secret set WafWebAclArn ${{ secrets.WAF_WEB_ACL_ARN }} -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }}
          # Production stage
          PROD_STAGE="${{ steps.get_branch_name.outputs.SST_STAGE }}-prod"
          npm run sst secret set PartnerId ${{ secrets.PROD_PREVIEW_PARTNER_ID }} -- --stage $PROD_STAGE &&
          npm run sst secret set CallbackUrl ${{ secrets.PROD_PREVIEW_CALLBACK_URL }} -- --stage $PROD_STAGE &&
          npm run sst secret set SmileIdApiKey ${{ secrets.PROD_PREVIEW_SMILEID_API_KEY }} -- --stage $PROD_STAGE &&
          npm run sst secret set SmileIdEnvironment ${{ secrets.PROD_PREVIEW_SMILEID_ENVIRONMENT }} -- --stage $PROD_STAGE &&
          npm run sst secret set EmbedUrl ${{ env.DEST_DIR_EMBED }} -- --stage $PROD_STAGE &&
          npm run sst secret set WafWebAclArn ${{ secrets.WAF_WEB_ACL_ARN }} -- --stage $PROD_STAGE
      - name: deploy sst app (sandbox)
        if: github.event.pull_request.merged != true
        id: deploy_sst_app
        run: |
          SST_OUTPUT=$(npm run sst deploy -- --stage ${{ steps.get_branch_name.outputs.SST_STAGE }} 2>&1)
          echo "$SST_OUTPUT"
          SST_URL=$(echo "$SST_OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | sed -n 's/^.*site: //p' | head -1 | tr -d '\r\n')
          echo "SST_URL=$SST_URL" >> $GITHUB_OUTPUT
      - name: deploy sst app (prod)
        if: github.event.pull_request.merged != true
        id: deploy_sst_app_prod
        run: |
          PROD_STAGE="${{ steps.get_branch_name.outputs.SST_STAGE }}-prod"
          SST_PROD_OUTPUT=$(npm run sst deploy -- --stage $PROD_STAGE 2>&1)
          echo "$SST_PROD_OUTPUT"
          SST_PROD_URL=$(echo "$SST_PROD_OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | sed -n 's/^.*site: //p' | head -1 | tr -d '\r\n')
          echo "SST_PROD_URL=$SST_PROD_URL" >> $GITHUB_OUTPUT
  share-preview-url:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    needs: [full-stack, embed]
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set node version
        uses: actions/setup-node@v4
      - name: install dependencies
        run: npm ci
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: install sst
        continue-on-error: true
        run: |
          curl -fsSL https://ion.sst.dev/install | VERSION=3.4.5 bash
      - name: install previews dependencies
        working-directory: ./previews
        run: npm install
      - name: set branch name
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          BRANCH_NAME="$BRANCH_REF"
          SANITIZED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "SANITIZED_BRANCH_NAME=$SANITIZED_BRANCH_NAME" >> "$GITHUB_ENV"
      - name: retrieve sst app url
        continue-on-error: true
        id: get_app_url
        working-directory: ./previews
        run: |
          SHELL_SANDBOX_OUTPUT=$(npm run sst -- shell --stage "$SANITIZED_BRANCH_NAME" --print-logs node get_app_url.js || true)
          SHELL_SANDBOX_URL=$(printf '%s\n' "$SHELL_SANDBOX_OUTPUT" | grep -Eo 'https://[^[:space:]]+' | head -1)
          DEPLOY_SANDBOX_URL=$(printf '%s\n' "${{ needs.full-stack.outputs.SST_URL }}" | grep -Eo 'https://[^[:space:]]+' | head -1)

          PREVIEW_APP_URL="$SHELL_SANDBOX_URL"
          if [ -z "$PREVIEW_APP_URL" ]; then
            PREVIEW_APP_URL="$DEPLOY_SANDBOX_URL"
          fi
          echo "PREVIEW_APP_URL=$PREVIEW_APP_URL" >> $GITHUB_OUTPUT
      - name: retrieve sst app url (prod)
        continue-on-error: true
        id: get_app_url_prod
        working-directory: ./previews
        run: |
          PROD_STAGE="${SANITIZED_BRANCH_NAME}-prod"
          SHELL_PROD_OUTPUT=$(npm run sst -- shell --stage "$PROD_STAGE" --print-logs node get_app_url.js || true)
          SHELL_PROD_URL=$(printf '%s\n' "$SHELL_PROD_OUTPUT" | grep -Eo 'https://[^[:space:]]+' | head -1)
          DEPLOY_PROD_URL=$(printf '%s\n' "${{ needs.full-stack.outputs.SST_PROD_URL }}" | grep -Eo 'https://[^[:space:]]+' | head -1)

          PREVIEW_PROD_APP_URL="$SHELL_PROD_URL"
          if [ -z "$PREVIEW_PROD_APP_URL" ]; then
            PREVIEW_PROD_APP_URL="$DEPLOY_PROD_URL"
          fi
          echo "PREVIEW_PROD_APP_URL=$PREVIEW_PROD_APP_URL" >> $GITHUB_OUTPUT
      - name: get dest dir for web smart-camera-web
        id: get_dest_dir_smart_camera_web
        working-directory: ./packages/smart-camera-web
        run: >-
          echo "DEST_DIR_SMART_CAMERA_WEB=js/preview-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" >>
          "$GITHUB_ENV"
      - name: get dest dir for web embed
        id: get_dest_dir_embed
        working-directory: ./packages/embed
        run: echo "DEST_DIR_EMBED=inline/preview-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - name: share preview urls as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const body = `This branch has been deployed to s3 / cloudfront.

              ✅ Preview URL for Smart Camera Web:

                https://cdn.smileidentity.com/${{ env.DEST_DIR_SMART_CAMERA_WEB }}/smart-camera-web.js

              ✅ Preview URL for Embed:

                https://cdn.smileidentity.com/${{ env.DEST_DIR_EMBED }}/js/script.min.js

              ✅ Preview URL for Web Client (Sandbox):

                ${{ steps.get_app_url.outputs.PREVIEW_APP_URL }}

              ✅ Preview URL for Web Client (Production):

                ${{ steps.get_app_url_prod.outputs.PREVIEW_PROD_APP_URL }}
              `;

              const marker = '<!-- preview-urls -->';
              const markedBody = marker + '\n' + body;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(c => c.body.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: markedBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: markedBody,
                });
              }
            } catch (error) {
              if (error && error.status === 403) {
                core.warning('Skipping PR comment: GITHUB_TOKEN cannot write comments for this event context.');
                return;
              }
              throw error;
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
