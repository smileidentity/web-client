name: lint
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: set node version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npx prettier --check .
      - name: version consistency
        run: node ./scripts/versionConsistency.js
      - name: locale parity
        run: node ./scripts/checkLocaleParity.js
      - name: Check Dependency Versions
        run: npm exec check-dependency-version-consistency || true
  web-components:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/web-components
    steps:
      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: set node version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npm run lint
  smart-camera-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/smart-camera-web
    steps:
      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: set node version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npm run lint
  embed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/embed
    steps:
      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: set node version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      - name: install dependencies
        run: npm ci
      - name: lint html
        run: npm run lint:html
