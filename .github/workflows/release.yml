name: release
on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test suite for faster release'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ensure running from a v* tag
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "::error::This workflow must be triggered from a v* tag. Current ref: ${{ github.ref }}"
          exit 1

      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version (v$TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

  test:
    needs: [validate]
    if: ${{ inputs.skip_tests == false }}
    uses: ./.github/workflows/test.yml

  publish:
    needs: [validate, test]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./packages/web-components
    steps:
      - name: checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: install dependencies
        run: npm ci

      - name: publish to npm with provenance
        run: npm publish --provenance --access public

  deploy:
    needs: [validate]
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      skip_tests: ${{ inputs.skip_tests }}
      skip_validation: true
    secrets: inherit
