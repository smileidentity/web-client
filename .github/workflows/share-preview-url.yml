name: share-preview-url
on:
  workflow_dispatch:
    inputs:
      ref_name:
        description: 'Branch name'
        required: true
        default: 'main'
        type: string
  workflow_call:
    inputs:
      ref_name:
        description: 'Branch name'
        required: true
        default: 'main'
        type: string
jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: set node version
        uses: actions/setup-node@v6
      - name: install dependencies
        run: npm ci
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: install sst
        continue-on-error: true
        run: |
          curl -fsSL https://ion.sst.dev/install | VERSION=3.4.5 bash
      - name: set branch name
        run: |
          if [ -n "${{ github.event.inputs.ref_name }}" ]; then
            BRANCH_NAME="${{ github.event.inputs.ref_name }}"
          elif [ -n "${{ github.event.workflow_run.head_branch }}" ]; then
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          elif [ -n "${GITHUB_HEAD_REF}" ]; then
            BRANCH_NAME="${GITHUB_HEAD_REF}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          SANITIZED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "SANITIZED_BRANCH_NAME=$SANITIZED_BRANCH_NAME" >> $GITHUB_ENV
      - name: retrieve sst app url (sandbox)
        continue-on-error: true
        id: get_app_url
        working-directory: ./previews
        run: |
          APP_URL=$(npm run sst -- shell --stage "$SANITIZED_BRANCH_NAME" --print-logs node get_app_url.js)
          echo "PREVIEW_APP_URL=$APP_URL" >> $GITHUB_OUTPUT
      - name: retrieve sst app url (prod)
        continue-on-error: true
        id: get_app_url_prod
        working-directory: ./previews
        run: |
          PROD_STAGE="$SANITIZED_BRANCH_NAME-prod"
          APP_PROD_URL=$(npm run sst -- shell --stage "$PROD_STAGE" --print-logs node get_app_url.js)
          echo "PREVIEW_PROD_APP_URL=$APP_PROD_URL" >> $GITHUB_OUTPUT
      - name: get dest dir for web smart-camera-web
        id: get_dest_dir_smart_camera_web
        working-directory: ./packages/smart-camera-web
        run: >-
          echo "DEST_DIR_SMART_CAMERA_WEB=js/preview-$GITHUB_HEAD_REF" >>
          "$GITHUB_ENV"
      - name: get dest dir for web embed
        id: get_dest_dir_embed
        working-directory: ./packages/embed
        run: echo "DEST_DIR_EMBED=inline/preview-$GITHUB_HEAD_REF" >> "$GITHUB_ENV"
      - name: share preview urls as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const body = `This branch has been deployed to s3 / cloudfront.

              ✅ Preview URL for Smart Camera Web:

              https://cdn.smileidentity.com/${{ env.DEST_DIR_SMART_CAMERA_WEB }}/smart-camera-web.js

              ✅ Preview URL for Embed:

              https://cdn.smileidentity.com/${{ env.DEST_DIR_EMBED }}/js/script.min.js

              ✅ Preview URL for Web Client (Sandbox):

              ${{ steps.get_app_url.outputs.PREVIEW_APP_URL }}

              ✅ Preview URL for Web Client (Production):

              ${{ steps.get_app_url_prod.outputs.PREVIEW_PROD_APP_URL }}
              `;

              const marker = '<!-- preview-urls -->';
              const markedBody = marker + '\n' + body;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(c => c.body.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: markedBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: markedBody,
                });
              }
            } catch (error) {
              if (error && error.status === 403) {
                core.warning('Skipping PR comment: GITHUB_TOKEN cannot write comments for this event context.');
                return;
              }
              throw error;
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}
